<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>FrenchMate Dashboard</title>

<link rel="stylesheet"
href="style.css">

</head>

<body class="dashboard-page">
    
<div class="app">

    <div class="sidebar">

        <h2>FrenchMate</h2>

<input
id="searchWord"
type="text"
placeholder="Search French Word"
oninput="showSuggestions()">

<button onclick="manualSearch()">
🔍 Search
</button>

<div id="suggestions"></div>
        

    </div>

<div id="content">

<h1>Welcome To FrenchMate</h1>

<p>
Search a word to start learning French.
</p>

<hr>

<div class="feature-card">

<h2>📝 Grammar</h2>

<p>
French grammar lessons coming soon.
</p>

</div>

<div class="feature-card">

<h2>🔄 Conjugation</h2>

<p>
French verb conjugator coming soon.
</p>

</div>

<div class="feature-card">

<h2>🎯 Quiz</h2>

<p>
Interactive quizzes coming soon.
</p>

</div>

</div>

    
<script src="dictionary.js"></script>
<script src="app.js"></script>

</body>

</html>
