<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FrenchMate Dashboard</title>

<link rel="stylesheet" href="style.css">

</head>

<body class="dashboard-page">

<div class="app">

    <aside class="sidebar">

        <h2>FrenchMate</h2>

        <button onclick="showFavorites()">
            ⭐ Favorites
        </button>

        <input
        id="searchWord"
        type="text"
        placeholder="Search French Word"
        oninput="showSuggestions()">

        <div id="suggestions"></div>

        <button onclick="manualSearch()">
            🔍 Search
        </button>

    </aside>

    <main id="content">

        <div class="hero-card">

            <h1>📚 FrenchMate Dictionary</h1>

            <h2>New Search Engine</h2>

            <p>
            Dictionary A-Z Database System
            </p>

        </div>

    </main>

</div>

<div class="bg-shapes">

    <div class="shape blue"></div>
    <div class="shape red"></div>
    <div class="shape white"></div>

    <div class="shape blue"></div>
    <div class="shape red"></div>
    <div class="shape white"></div>

    <div class="shape blue"></div>
    <div class="shape red"></div>
    <div class="shape white"></div>

</div>

<script src="js/engine.js"></script>

<script src="js/loader.js"></script>
<script src="js/search.js"></script>
<script src="js/render.js"></script>
<script src="js/suggestions.js"></script>

<script src="js/favorites.js"></script>
<script src="js/speech.js"></script>
<script src="js/router.js"></script>

<script>

async function manualSearch(){

    const word =
    document
    .getElementById("searchWord")
    .value
    .trim();

    if(!word) return;

    const result =
    await searchWord(word);

    renderWord(result);

}

document
.getElementById("searchWord")
.addEventListener(
"keydown",
async function(e){

    if(e.key === "Enter"){

        await manualSearch();

    }

}
);

</script>

</body>
</html>
