<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>FrenchMate Dashboard</title>
<input
id="quickSearch"
type="text"
placeholder="Search French Word">

<button onclick="goToDictionary()">
Search
</button>
  
<link rel="stylesheet"
href="style.css">

</head>
<script>

function goToDictionary(){

const word =
document
.getElementById("quickSearch")
.value;

if(word){

window.location.href =
"dictionary.html?word=" +
encodeURIComponent(word);

}

}

</script>
  
<body>

<div class="login-box">

<h1>FrenchMate</h1>

<h2 id="welcome"></h2>

<button
onclick="window.location.href='dictionary.html'">
📖 Dictionary
</button>
  
<button>
📝 Grammar
</button>

<button>
🔄 Conjugation
</button>

<button>
🎯 Quiz
</button>

</div>

<script src="app.js"></script>

</body>

</html>
