<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FrenchMate Dictionary</title>

<link rel="stylesheet" href="style.css">

</head>

<body class="dashboard-page">

<div class="app">

<aside class="sidebar">

<h2>FrenchMate</h2>

<input
id="searchWord"
type="text"
placeholder="Search French Word">

<button onclick="manualSearch()">
🔍 Search
</button>

</aside>

<main id="content">

<div class="hero-card">

<h1>📚 FrenchMate Dictionary</h1>

<h2>New Search Engine</h2>

<p>
Ready...
</p>

</div>

</main>

</div>

<script src="js/loader.js"></script>
<script src="js/search.js"></script>
<script src="js/render.js"></script>

<script>

async function manualSearch(){

const word =
document
.getElementById("searchWord")
.value
.trim();

const result =
await searchWord(word);

renderWord(result);

}

document
.getElementById("searchWord")
.addEventListener(
"keydown",
async function(event){

if(event.key === "Enter"){

await manualSearch();

}

}
);

</script>

</body>

</html>
