<script src="js/loader.js"></script>
<script src="js/search.js"></script>

<script>

async function manualSearch(){

    const word =
    document.getElementById("searchWord")
    .value
    .trim();

    const found =
    await searchWord(word);

    console.log(found);

    if(found){

        alert(
            found.word +
            " = " +
            found.meaning
        );

    }else{

        alert("Not Found");

    }

}

</script>
